<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 頻道分析工具</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <h1>Youtube Analysis</h1>

    <div id="settings">
        <label for="localModel">Ollama 模型:</label>
        <select id="localModel">
            <option value="">載入中...</option>
        </select>

        <h2>已分析的頻道</h2>
        <select id="channelSelect" onchange="updateChannelMeta()">
            <option value="">載入中...</option>
        </select>
        <p id="channelMeta" style="margin:4px 0;"></p>
        <div>
            <button onclick="loadResults(selectedChannelId())">查看結果</button>
            <button onclick="channelFetchAndAnalyze(selectedChannelId())">補抓並分析</button>
            <button onclick="channelAnalyzeCached(selectedChannelId())">直接分析</button>
            <button onclick="channelFetchOnly(selectedChannelId())">僅補抓</button>
            <button onclick="channelDelete(selectedChannelId())">刪除</button>
        </div>

        <h2>新增頻道</h2>
        <form id="newChannelForm">
            <label for="channel">頻道 handle 或 ID:</label>
            <input type="text" id="channel" placeholder="@SomeChannel" required>

            <label for="maxVideos">最多分析影片數:</label>
            <input type="number" id="maxVideos" value="20" min="5" max="100">

            <fieldset>
                <legend>分析選項</legend>
                <label><input type="checkbox" id="skipAudience"> 跳過觀眾分析</label>
                <label><input type="checkbox" id="skipBrand"> 跳過品牌分析</label>
            </fieldset>

            <button type="submit">開始抓取並分析</button>
        </form>

        <div id="status" style="display:none;">
            <h3>執行進度</h3>
            <pre id="statusLog"></pre>
        </div>
    </div>

    <div id="results" style="display:none;">
        <h2>分析結果</h2>

        <div id="channelInfo">
            <h3 id="channelTitle"></h3>
            <p id="lastUpdated"></p>
        </div>

        <div id="stats">
            <h3>統計摘要</h3>
            <div id="statsContent"></div>
        </div>

        <div id="audience">
            <h3>觀眾分析</h3>
            <div id="audienceContent"></div>
        </div>

        <div id="brand">
            <h3>品牌定位</h3>
            <div id="brandContent"></div>
        </div>

        <button onclick="backToSettings()">返回</button>
    </div>

    <script>
        const status = document.getElementById('status');
        const statusLog = document.getElementById('statusLog');
        const results = document.getElementById('results');
        const settings = document.getElementById('settings');
        const localModelSelect = document.getElementById('localModel');

        function fmtDate(iso) {
            if (!iso || iso === 'Unknown') return '—';
            return iso.slice(0, 10);
        }

        async function loadOllamaModels() {
            try {
                const res = await fetch('/api/ollama/models');
                const data = await res.json();
                localModelSelect.innerHTML = '';
                if (data.models && data.models.length > 0) {
                    data.models.forEach(m => {
                        const opt = document.createElement('option');
                        opt.value = m; opt.textContent = m;
                        localModelSelect.appendChild(opt);
                    });
                } else {
                    localModelSelect.innerHTML = '<option value="">無可用模型</option>';
                }
            } catch {
                localModelSelect.innerHTML = '<option value="">載入失敗</option>';
            }
        }

        let cachedChannels = [];

        function selectedChannelId() {
            return document.getElementById('channelSelect').value;
        }

        function updateChannelMeta() {
            const id = selectedChannelId();
            const ch = cachedChannels.find(c => c.channel_id === id);
            const el = document.getElementById('channelMeta');
            if (ch) {
                el.textContent = `${ch.total_videos} 支影片　上次抓取: ${fmtDate(ch.last_fetched)} ／ 上次分析: ${fmtDate(ch.last_updated)}`;
            } else {
                el.textContent = '';
            }
        }

        async function loadChannelList() {
            const sel = document.getElementById('channelSelect');
            try {
                const res = await fetch('/api/list_cached_channels');
                const data = await res.json();
                cachedChannels = data.channels || [];
                if (cachedChannels.length === 0) {
                    sel.innerHTML = '<option value="">尚無已分析的頻道</option>';
                } else {
                    sel.innerHTML = cachedChannels.map(ch =>
                        `<option value="${ch.channel_id}">${ch.channel_title}</option>`
                    ).join('');
                }
                updateChannelMeta();
            } catch {
                sel.innerHTML = '<option value="">載入失敗</option>';
            }
        }

        async function loadResults(channelId) {
            try {
                const res = await fetch('/api/load_cache', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ channel_id: channelId })
                });
                const data = await res.json();
                displayResults(data);
                settings.style.display = 'none';
                results.style.display = 'block';
            } catch (e) {
                alert('載入失敗: ' + e.message);
            }
        }

        async function channelDelete(channelId) {
            if (!channelId) return;
            if (!confirm('確定刪除此頻道的所有資料？')) return;
            try {
                const res = await fetch(`/api/channels/${channelId}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    loadChannelList();
                } else {
                    alert('刪除失敗: ' + data.error);
                }
            } catch (e) {
                alert('刪除失敗: ' + e.message);
            }
        }

        function channelFetchAndAnalyze(channelId) {
            if (!channelId) return;
            runStreamingTask(`/api/channels/${channelId}/fetch_and_analyze`, { localModel: localModelSelect.value }, true);
        }

        function channelAnalyzeCached(channelId) {
            if (!channelId) return;
            runStreamingTask(`/api/channels/${channelId}/analyze`, { localModel: localModelSelect.value }, true);
        }

        function channelFetchOnly(channelId) {
            if (!channelId) return;
            runStreamingTask(`/api/channels/${channelId}/fetch`, {}, false);
        }

        function runStreamingTask(endpoint, body, showResults) {
            status.style.display = 'block';
            results.style.display = 'none';
            statusLog.textContent = '';

            fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            })
            .then(res => res.json())
            .then(({ task_id }) => {
                const es = new EventSource(`/api/stream/${task_id}`);
                es.onmessage = (event) => {
                    const { message: msg } = JSON.parse(event.data);
                    if (msg.startsWith('DONE:')) {
                        es.close();
                        status.style.display = 'none';
                        const result = JSON.parse(msg.substring(5));
                        if (showResults) {
                            displayResults(result);
                            settings.style.display = 'none';
                            results.style.display = 'block';
                        } else {
                            loadChannelList();
                        }
                    } else if (msg.startsWith('ERROR:')) {
                        es.close();
                        statusLog.textContent += '\n錯誤: ' + msg.substring(6);
                    } else {
                        statusLog.textContent += msg + '\n';
                        statusLog.scrollTop = statusLog.scrollHeight;
                    }
                };
                es.onerror = () => { statusLog.textContent += '\n連線中斷'; es.close(); };
            })
            .catch(e => { statusLog.textContent = '錯誤: ' + e.message; });
        }

        document.getElementById('newChannelForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const body = {
                channel: document.getElementById('channel').value,
                localModel: localModelSelect.value,
                maxVideos: parseInt(document.getElementById('maxVideos').value),
                skipAudience: document.getElementById('skipAudience').checked,
                skipBrand: document.getElementById('skipBrand').checked,
            };
            runStreamingTask('/api/analyze', body, true);
        });

        function backToSettings() {
            settings.style.display = 'block';
            results.style.display = 'none';
            loadChannelList();
        }

        async function loadMarkdownReport(channelId, filename, elementId) {
            const el = document.getElementById(elementId);
            el.textContent = '載入中...';
            try {
                const res = await fetch(`/api/reports/${channelId}/${filename}`);
                if (!res.ok) { el.textContent = '暫無報告'; return; }
                el.innerHTML = marked.parse(await res.text());
            } catch {
                el.textContent = '載入失敗';
            }
        }

        function displayResults(data) {
            const channelId = data.summary.channel_id;
            document.getElementById('channelTitle').textContent = data.summary.channel_title || 'Unknown';
            document.getElementById('lastUpdated').textContent =
                `上次抓取: ${fmtDate(data.summary.last_fetched)} ／ 上次分析: ${fmtDate(data.summary.last_updated)}`;

            const stats = data.summary.stats || {};
            document.getElementById('statsContent').innerHTML = `
                <p>總影片數: ${stats.total_videos || 0}</p>
                <p>分析留言數: ${stats.total_comments_analyzed || 0}</p>
            `;

            loadMarkdownReport(channelId, 'audience_report.md', 'audienceContent');
            loadMarkdownReport(channelId, 'brand_report.md', 'brandContent');
        }

        loadOllamaModels();
        loadChannelList();
    </script>
</body>
</html>
